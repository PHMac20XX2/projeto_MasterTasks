<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MasterTasks</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
<div class="login-container">
      <div class="login-box">
        <img src="css/images/iconeaba.png" alt="logo" class="login-logo" />
        <h2 class="titulo-container">MasterTasks</h2>

        <form>
          <div class="input-container">
            <label for="email">E-mail</label>
            <input
              type="email"
              id="email"
              placeholder="seu@email.com"
              required
            />
          </div>

          <!-- botão de envio -->
          <button type="submit" id="btn-login" class="btn-login">Enviar e-mail de recuperação</button>
  </body>
</html>
